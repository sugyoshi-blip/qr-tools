<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRコード生成 AES v3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  body { background: #f5f0e8; font-family: sans-serif; padding: 20px; max-width: 480px; margin: 0 auto; }
  h2 { text-align: center; margin-bottom: 20px; color: #333; }
  label { display: block; margin-top: 12px; font-size: 14px; color: #555; }
  input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; margin-top: 4px; box-sizing: border-box; }
  button { display: block; width: 100%; margin-top: 20px; padding: 14px; background: #222; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
  #qr-area { text-align: center; margin-top: 24px; }
  #qr-canvas-wrap { display: inline-block; padding: 16px; background: white; border-radius: 8px; border: 1px solid #ccc; }
  #info { text-align: center; margin-top: 8px; font-size: 13px; color: #666; }
  #save-btn { display: none; background: #8B4513; margin-top: 12px; }
</style>
</head>
<body>
<h2>🔐 QRコード生成 AES v3</h2>

<label>部屋番号</label>
<input id="room" type="text" placeholder="例: 61-201">

<label>電話番号</label>
<input id="phone" type="tel" placeholder="例: 03-xxxx-xxxx">

<label>名前</label>
<input id="name" type="text" placeholder="例: 大島">

<button onclick="generate()">▶ QRコードを生成する</button>

<div id="qr-area"></div>
<div id="info"></div>
<button id="save-btn" onclick="saveQR()">↓ QRコードを保存</button>

<script>
const SECRET = 'y37991291K1';

function generate() {
  const room = document.getElementById('room').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const name = document.getElementById('name').value.trim();
  if (!room || !phone) { alert('部屋番号と電話番号は必須です'); return; }

  const data = { room, phone, name };
  const json = JSON.stringify(data);
  const encrypted = CryptoJS.AES.encrypt(json, SECRET).toString();

  const area = document.getElementById('qr-area');
  area.innerHTML = '<div id="qr-canvas-wrap"><div id="qr-canvas"></div></div>';

  new QRCode(document.getElementById('qr-canvas'), {
    text: encrypted,
    width: 240,
    height: 240,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  document.getElementById('info').textContent = `ROOM: ${room} | TEL: ${phone}${name ? ' | ' + name : ''}`;
  document.getElementById('save-btn').style.display = 'block';
}

function saveQR() {
  // canvasに白背景付きで描画して保存
  const qrCanvas = document.querySelector('#qr-canvas canvas');
  const qrImg = document.querySelector('#qr-canvas img');

  const saveCanvas = document.createElement('canvas');
  const padding = 20;
  const size = 240;
  saveCanvas.width = size + padding * 2;
  saveCanvas.height = size + padding * 2 + 30;
  const ctx = saveCanvas.getContext('2d');

  // 白背景
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, saveCanvas.width, saveCanvas.height);

  // QRコード描画
  if (qrCanvas) {
    ctx.drawImage(qrCanvas, padding, padding, size, size);
  } else if (qrImg) {
    ctx.drawImage(qrImg, padding, padding, size, size);
  }

  // テキスト描画
  const room = document.getElementById('room').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const name = document.getElementById('name').value.trim();
  ctx.fillStyle = '#333333';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(`ROOM: ${room}  TEL: ${phone}${name ? '  ' + name : ''}`, saveCanvas.width / 2, size + padding + 20);

  const link = document.createElement('a');
  link.download = `qr_${room}.png`;
  link.href = saveCanvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
