<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR解読 AES v1</title>
<script src="https://unpkg.com/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f1a; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
  #scanner-view { display: flex; flex-direction: column; height: 100%; }
  #result-view { display: none; overflow-y: auto; }
  .app-bar { background: #000; padding: 10px 16px; font-size: 16px; font-weight: bold; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
  .version { font-size: 11px; color: rgba(255,255,255,0.4); }
  .camera-wrap { position: relative; flex: 1; background: #000; overflow: hidden; min-height: 0; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-frame {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 55vw; height: 55vw;
    max-width: 220px; max-height: 220px;
    border: 3px solid #1A73E8; border-radius: 16px;
    pointer-events: none;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  }
  .bottom-area { flex-shrink: 0; background: #0f0f1a; padding: 10px 16px 16px; }
  #status-msg { text-align: center; color: #1A73E8; font-size: 12px; margin-bottom: 8px; min-height: 20px; }
  #start-btn {
    display: block; background: #1A73E8; color: white; border: none;
    border-radius: 12px; padding: 14px; font-size: 15px;
    cursor: pointer; width: 100%; margin-bottom: 6px;
  }
  .scan-hint { text-align: center; color: rgba(255,255,255,0.5); font-size: 11px; }
  .result-bar {
    background: #0f0f1a; padding: 14px 16px; font-size: 17px; font-weight: bold;
    display: flex; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);
    position: sticky; top: 0;
  }
  .back-btn { background: none; border: none; color: white; font-size: 22px; cursor: pointer; margin-right: 10px; }
  .result-content { padding: 20px; }
  .result-icon { font-size: 48px; margin-bottom: 12px; }
  .result-title { font-size: 22px; font-weight: bold; margin-bottom: 24px; }
  .info-card {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 16px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 14px;
  }
  .info-icon { font-size: 26px; }
  .info-label { font-size: 11px; color: rgba(255,255,255,0.54); margin-bottom: 3px; }
  .info-value { font-size: 20px; font-weight: bold; }
  .copy-btn { margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer; }
  .scan-again-btn {
    background: #1A73E8; color: white; border: none;
    border-radius: 12px; padding: 14px; font-size: 15px;
    cursor: pointer; width: 100%; margin-top: 12px;
  }
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); color: white;
    padding: 10px 20px; border-radius: 20px; font-size: 13px;
    display: none; z-index: 999;
  }
  canvas { display: none; }
</style>
</head>
<body>

<div id="scanner-view">
  <div class="app-bar">
    🔐 QR解読 <span class="version">AES v1</span>
  </div>
  <div class="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-frame"></div>
  </div>
  <div class="bottom-area">
    <div id="status-msg">ボタンを押してカメラを起動してください</div>
    <button id="start-btn" onclick="startCamera()">📷 カメラを起動</button>
    <p class="scan-hint">QRコードを枠内に合わせてください</p>
  </div>
</div>

<div id="result-view">
  <div class="result-bar">
    <button class="back-btn" onclick="goBack()">←</button>解読結果
  </div>
  <div class="result-content" id="result-content"></div>
</div>

<canvas id="canvas"></canvas>
<div class="toast" id="toast"></div>

<script>
const SECRET = 'y37991291K1';
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let scanning = false;
let animFrame = null;
let stream = null;

function setStatus(msg, color) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.style.color = color || '#1A73E8';
}

async function startCamera() {
  setStatus('カメラを起動中...');
  document.getElementById('start-btn').style.display = 'none';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }
    });
    video.srcObject = stream;
    await video.play();
    scanning = true;
    setStatus('スキャン中...');
    scanLoop();
  } catch (e) {
    setStatus('エラー: ' + e.message, '#EA4335');
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('start-btn').textContent = '🔄 再試行';
  }
}

function scanLoop() {
  if (!scanning) return;
  try {
    if (video.readyState >= 2 && video.videoWidth > 0) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code && code.data) {
        scanning = false;
        cancelAnimationFrame(animFrame);
        showResult(code.data);
        return;
      }
    }
  } catch(e) {
    setStatus('エラー: ' + e.message, '#EA4335');
  }
  animFrame = requestAnimationFrame(scanLoop);
}

function decodeData(text) {
  // AES復号を試みる
  try {
    const bytes = CryptoJS.AES.decrypt(text, SECRET);
    const json = bytes.toString(CryptoJS.enc.Utf8);
    if (json) return JSON.parse(json);
  } catch (_) {}
  // 旧形式（Base64）も対応
  try {
    const decoded = decodeURIComponent(atob(text).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
    return JSON.parse(decoded);
  } catch (_) {}
  try { return JSON.parse(text); } catch (_) {}
  return null;
}

function showResult(raw) {
  if (stream) { stream.getTracks().forEach(t => t.stop()); }
  document.getElementById('scanner-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
  const content = document.getElementById('result-content');
  const data = decodeData(raw);
  if (data && (data.room || data.roomNumber || data.phone || data.tel)) {
    const room = data.room || data.roomNumber || '';
    const phone = data.phone || data.tel || '';
    const name = data.name || '';
    content.innerHTML = `
      <div class="result-icon">✅</div>
      <div class="result-title">解読成功</div>
      ${room ? `<div class="info-card"><div class="info-icon">🚪</div><div><div class="info-label">部屋番号</div><div class="info-value">${room}</div></div></div>` : ''}
      ${phone ? `<div class="info-card"><div class="info-icon">📞</div><div><div class="info-label">電話番号</div><div class="info-value">${phone}</div></div><button class="copy-btn" onclick="copyText('${phone}')">📋</button></div>` : ''}
      ${name ? `<div class="info-card"><div class="info-icon">👤</div><div><div class="info-label">名前</div><div class="info-value">${name}</div></div></div>` : ''}
      <button class="scan-again-btn" onclick="scanAgain()">📷 もう一度スキャン</button>`;
  } else {
    content.innerHTML = `
      <div class="result-icon">❌</div>
      <div class="result-title">解読できませんでした</div>
      <div class="info-card" style="display:block">
        <div class="info-label">このQRコードは対応フォーマットではありません</div>
      </div>
      <button class="scan-again-btn" onclick="scanAgain()">← 戻る</button>`;
  }
}

function goBack() { scanAgain(); }

function scanAgain() {
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('scanner-view').style.display = 'flex';
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('start-btn').textContent = '📷 カメラを起動';
  setStatus('ボタンを押してカメラを起動してください');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    t.textContent = 'コピーしました'; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  });
}
</script>
</body>
</html>
