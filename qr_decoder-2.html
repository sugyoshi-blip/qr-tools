<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR解読</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f1a; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  #scanner-view { display: flex; flex-direction: column; height: 100%; }
  #result-view { display: none; }

  .app-bar {
    background: #000;
    padding: 12px 16px;
    font-size: 17px;
    font-weight: bold;
    flex-shrink: 0;
  }
  .warn-box {
    background: #1a1a00;
    border: 1px solid #ffcc00;
    border-radius: 10px;
    margin: 8px 12px;
    padding: 10px 14px;
    font-size: 12px;
    color: #ffcc00;
    display: none;
    flex-shrink: 0;
  }
  .camera-wrap {
    position: relative;
    flex: 1;
    background: #000;
    overflow: hidden;
    min-height: 0;
  }
  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .scan-frame {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60vw;
    height: 60vw;
    max-width: 240px;
    max-height: 240px;
    border: 3px solid #1A73E8;
    border-radius: 16px;
    pointer-events: none;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
  }
  .bottom-area {
    flex-shrink: 0;
    background: #0f0f1a;
    padding: 8px 16px 12px;
  }
  #status-msg {
    text-align: center;
    color: #1A73E8;
    font-size: 13px;
    margin-bottom: 8px;
  }
  #start-btn {
    display: block;
    background: #1A73E8;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
  }
  .scan-hint {
    text-align: center;
    padding: 6px 0 0;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
  }

  /* 結果画面 */
  .result-bar {
    background: #0f0f1a;
    padding: 14px 16px;
    font-size: 17px;
    font-weight: bold;
    display: flex;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .back-btn {
    background: none; border: none; color: white;
    font-size: 22px; cursor: pointer; margin-right: 10px;
  }
  .result-content { padding: 20px; }
  .result-icon { font-size: 48px; margin-bottom: 12px; }
  .result-title { font-size: 22px; font-weight: bold; margin-bottom: 24px; }
  .info-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .info-icon { font-size: 26px; }
  .info-label { font-size: 11px; color: rgba(255,255,255,0.54); margin-bottom: 3px; }
  .info-value { font-size: 20px; font-weight: bold; }
  .copy-btn { margin-left: auto; background: none; border: none; color: rgba(255,255,255,0.5); font-size: 20px; cursor: pointer; }
  .scan-again-btn {
    background: #1A73E8; color: white; border: none;
    border-radius: 12px; padding: 14px; font-size: 15px;
    cursor: pointer; width: 100%; margin-top: 12px;
  }
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.8); color: white;
    padding: 10px 20px; border-radius: 20px; font-size: 13px;
    display: none; z-index: 999;
  }
  canvas { display: none; }
</style>
</head>
<body>

<div id="scanner-view">
  <div class="app-bar">📷 QR解読</div>
  <div class="warn-box" id="warn-box">
    ⚠️ カメラを使うにはHTTPSが必要です。GitHub Pagesにアップロードして開いてください。
  </div>
  <div class="camera-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-frame"></div>
  </div>
  <div class="bottom-area">
    <div id="status-msg">ボタンを押してカメラを起動してください</div>
    <button id="start-btn" onclick="startCamera()">📷 カメラを起動</button>
    <p class="scan-hint">QRコードを枠内に合わせてください</p>
  </div>
</div>

<div id="result-view">
  <div class="result-bar">
    <button class="back-btn" onclick="goBack()">←</button>解読結果
  </div>
  <div class="result-content" id="result-content"></div>
</div>

<canvas id="canvas"></canvas>
<div class="toast" id="toast"></div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let scanning = false, animFrame = null;

if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
  document.getElementById('warn-box').style.display = 'block';
}

async function startCamera() {
  document.getElementById('status-msg').textContent = 'カメラを起動中...';
  document.getElementById('start-btn').style.display = 'none';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      scanning = true;
      document.getElementById('status-msg').textContent = 'スキャン中...';
      scanLoop();
    };
  } catch (e) {
    document.getElementById('status-msg').textContent = 'カメラエラー: ' + e.message;
    document.getElementById('start-btn').style.display = 'block';
    document.getElementById('start-btn').textContent = '🔄 再試行';
    document.getElementById('warn-box').style.display = 'block';
  }
}

function scanLoop() {
  if (!scanning) return;
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(d.data, d.width, d.height, { inversionAttempts: 'dontInvert' });
    if (code) { scanning = false; cancelAnimationFrame(animFrame); showResult(code.data); return; }
  }
  animFrame = requestAnimationFrame(scanLoop);
}

function decodeData(text) {
  try { return JSON.parse(atob(text)); } catch (_) {}
  try { return JSON.parse(text); } catch (_) {}
  return null;
}

function showResult(raw) {
  const data = decodeData(raw);
  document.getElementById('scanner-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'block';
  const content = document.getElementById('result-content');
  if (data && (data.room || data.roomNumber || data.phone || data.tel)) {
    const room = data.room || data.roomNumber || '';
    const phone = data.phone || data.tel || '';
    const name = data.name || '';
    content.innerHTML = `
      <div class="result-icon">✅</div>
      <div class="result-title">解読成功</div>
      ${room ? `<div class="info-card"><div class="info-icon">🚪</div><div><div class="info-label">部屋番号</div><div class="info-value">${room}</div></div></div>` : ''}
      ${phone ? `<div class="info-card"><div class="info-icon">📞</div><div><div class="info-label">電話番号</div><div class="info-value">${phone}</div></div><button class="copy-btn" onclick="copyText('${phone}')">📋</button></div>` : ''}
      ${name ? `<div class="info-card"><div class="info-icon">👤</div><div><div class="info-label">名前</div><div class="info-value">${name}</div></div></div>` : ''}
      <button class="scan-again-btn" onclick="scanAgain()">📷 もう一度スキャン</button>`;
  } else {
    content.innerHTML = `
      <div class="result-icon">❌</div>
      <div class="result-title">解読できませんでした</div>
      <div class="info-card" style="display:block"><div class="info-label">生データ</div><div style="font-size:12px;color:rgba(255,255,255,0.54);margin-top:8px;word-break:break-all">${raw}</div></div>
      <button class="scan-again-btn" onclick="scanAgain()">← 戻る</button>`;
  }
}

function goBack() { scanAgain(); }
function scanAgain() {
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('scanner-view').style.display = 'flex';
  scanning = true;
  document.getElementById('status-msg').textContent = 'スキャン中...';
  scanLoop();
}
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('コピーしました'));
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}
</script>
</body>
</html>
